<!doctype html>
<html>
  <head>
    <title>Login</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="auth-container">
      <div class="auth-card">
        <h2>Sign In</h2>

        <p class="auth-subtitle">
          Access your account to continue managing your todos.
        </p>

        <form method="POST">
          <input type="email" name="email" placeholder="Enter Email" required />

          <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
          />

          <button class="auth-btn">Login</button>
        </form>

        <div class="auth-link">
          New user?

          <a href="/signup"> Create Account </a>
        </div>
      </div>
    </div>
  </body>
</html>
