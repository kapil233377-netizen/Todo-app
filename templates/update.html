{% extends "base.html" %}

{% block title %} Update Todo {% endblock %}

{% block content %}

<div class="dashboard-header glass-card">
    <div>
        <h1>✏️ Update Todo</h1>
        <p>Edit your task details below.</p>
    </div>
</div>

<div class="glass-card p-4 mt-4">

    <form method="POST">

        <input
            type="text"
            name="title"
            value="{{todo.title}}"
            class="form-control mb-3"
            required
        >

        <textarea
            name="desc"
            class="form-control mb-3"
            rows="4"
            required
        >{{todo.desc}}</textarea>

        <button type="submit" class="btn btn-warning">
            Update Todo
        </button>

        <a href="/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
